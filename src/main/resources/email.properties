# Email Configuration for Ocean View Resort
# Uses Gmail SMTP - replace with your Gmail address and App Password
# To get an App Password: Google Account → Security → 2-Step Verification → App passwords

mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.from=your_email@gmail.com
mail.password=your_app_password_here
mail.from.name=Ocean View Resort
