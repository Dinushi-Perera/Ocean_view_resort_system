name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

jobs:
  # ────────────────────────────────────────────────
  # Stage 1 – Build
  # Compiles Java source and packages the WAR file.
  # ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile and package WAR
        run: mvn clean package -DskipTests --batch-mode

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocean-view-resort-war
          path: target/*.war
          retention-days: 7

  # ────────────────────────────────────────────────
  # Stage 2 – Test
  # Runs JUnit 5 test classes via Maven Surefire.
  # ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run JUnit tests
        run: mvn test --batch-mode

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-report
          path: target/surefire-reports/
          retention-days: 7

  # ────────────────────────────────────────────────
  # Stage 3 – Validate
  # Confirms all tests passed; blocks merging on
  # failure. This job is used as the required status
  # check on the main branch protection rule.
  # ────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: All checks passed
        run: echo "Build compiled, all tests passed – safe to merge."
